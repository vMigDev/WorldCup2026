<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(#{nav.top10})}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container">
    <div class="card">
        <h1 th:text="#{nav.top10}"></h1>
        <p th:text="#{top10.intro}"></p>

        <table>
            <tr>
                <th>[[#{label.rang}]]</th>
                <th>[[#{label.team}]]</th>
                <th>[[#{label.totaalscore}]]</th>
                <th>[[#{label.aantalleden}]]</th>
            </tr>
            <tr th:each="entry, iter : ${teams}">
                <td>
                    <strong th:if="${iter.count <= 3}" th:text="'#' + ${iter.count}" style="color: #0b57d0; font-size: 1.2rem;"></strong>
                    <span th:if="${iter.count > 3}" th:text="${iter.count}"></span>
                </td>
                <td th:text="${entry.team.teamNaam}" style="font-weight: bold;"></td>
                <td th:text="${entry.totaleScore} + ' ' + #{label.punten}"></td>
                <td th:text="${entry.aantalLeden}"></td>
            </tr>
        </table>
    </div>
</div>
</body>
</html>
