<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(#{title.team.manage})}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container">
    <div th:if="${foutmelding}" class="alert alert-danger" th:text="#{${foutmelding}}"></div>

    <div style="display: flex; gap: 2rem; flex-wrap: wrap;">

        <div class="card" style="flex: 1; min-width: 300px;">
            <h1 th:text="#{team.new.title}"></h1>
            <p th:text="#{team.new.intro}"></p>
            <form method="post" th:action="@{/team/nieuw}">
                <div class="form-group">
                    <label>[[#{label.teamnaam}]]</label>
                    <input type="text" name="teamNaam" required>
                </div>
                <button type="submit" class="btn">[[#{button.create.team}]]</button>
            </form>
        </div>

        <div class="card" style="flex: 1; min-width: 300px;">
            <h2 th:text="#{team.join.title}"></h2>
            <p th:text="#{team.join.intro}"></p>
            <form method="post" th:action="@{/team/join}">
                <div class="form-group">
                    <label>[[#{label.invitecode}]]</label>
                    <input type="text" name="uitnodigingscode" required>
                </div>
                <button type="submit" class="btn btn-secondary">[[#{button.join.team}]]</button>
            </form>
        </div>

    </div>
</div>
</body>
</html>
