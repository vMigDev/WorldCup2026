<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(#{app.title})}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container">
    <div th:if="${succes}" class="alert alert-success" th:text="#{${succes}}"></div>
    <div th:if="${foutmelding}" class="alert alert-danger" th:text="#{${foutmelding}}"></div>

    <div class="card">
        <h1 th:text="#{home.heading}"></h1>
        <p th:text="#{home.intro}"></p>
    </div>

    <div class="card">
        <h2 th:text="#{home.matches.title}"></h2>
        <table>
            <tr>
                <th>[[#{label.match}]]</th>
                <th>[[#{label.datum}]]</th>
                <th>[[#{label.locatie}]]</th>
                <th>[[#{label.match}]]</th>
            </tr>
            <tr th:each="wedstrijd : ${wedstrijden}">
                <td th:text="${wedstrijd.landA + ' vs ' + wedstrijd.landB}"></td>
                <td th:text="${#temporals.format(wedstrijd.datumTijd, #messages.msg('label.format.datetime'))}"></td>
                <td th:text="${wedstrijd.locatie}"></td>
                <td><a th:href="@{|/wedstrijd/${wedstrijd.id}|}" class="btn btn-secondary" style="padding: 0.3rem 0.6rem;">[[#{button.view}]]</a></td>
            </tr>
        </table>
    </div>
</div>
</body>
</html>
