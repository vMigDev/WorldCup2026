<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(#{screen.home.title})}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container">
    <div th:if="${succes}" class="alert alert-success" th:text="#{${succes}}"></div>
    <div th:if="${foutmelding}" class="alert alert-danger" th:text="#{${foutmelding}}"></div>

    <div class="card">
        <h1 th:text="#{home.heading}">FIFA World Cup 2026</h1>
        <p th:text="#{home.intro}"></p>
        <p th:text="#{screen.home.block}"></p>
    </div>

    <div class="card">
        <h2>Geplande Wedstrijden</h2>
        <table>
            <tr><th>Match</th><th th:text="#{label.datum}">Datum</th><th th:text="#{label.locatie}">Locatie</th><th>Details</th></tr>
            <tr th:each="wedstrijd : ${wedstrijden}">
                <td th:text="${wedstrijd.landA + ' vs ' + wedstrijd.landB}"></td>
                <td th:text="${#temporals.format(wedstrijd.datumTijd, #messages.msg('label.format.datetime'))}"></td>
                <td th:text="${wedstrijd.locatie}"></td>
                <td><a th:href="@{|/wedstrijd/${wedstrijd.id}|}" class="btn btn-secondary" style="padding: 0.3rem 0.6rem;">Bekijk</a></td>
            </tr>
        </table>
    </div>
</div>
</body>
</html>
