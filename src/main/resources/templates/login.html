<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(#{nav.login})}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container">
    <div class="card" style="max-width: 400px; margin: 2rem auto;">
        <h1 th:text="#{nav.login}"></h1>

        <p th:if="${param.error}" class="alert alert-danger" th:text="#{error.login.invalid}"></p>
        <p th:if="${param.logout}" class="alert alert-success" th:text="#{msg.logout.succes}"></p>
        <p th:if="${succes}" class="alert alert-success" th:text="#{${succes}}"></p>

        <form method="post" th:action="@{/login}">
            <div class="form-group">
                <label>[[#{label.gebruikersnaam}]]</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>[[#{label.wachtwoord}]]</label>
                <input type="password" name="password" required>
            </div>
            <div class="action-buttons">
                <button type="submit" class="btn" style="width: 100%;">[[#{nav.login}]]</button>
            </div>
        </form>

        <div style="margin-top: 1.5rem; text-align: center; border-top: 1px solid #eee; padding-top: 1rem;">
            <span>[[#{login.no.account}]]</span> <a th:href="@{/registreer}">[[#{nav.register}]]</a>
        </div>
    </div>
</div>
</body>
</html>
