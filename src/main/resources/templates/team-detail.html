<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head(${team.teamNaam})}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container">
    <div th:if="${succes}" class="alert alert-success" th:text="#{${succes}}"></div>
    <div th:if="${foutmelding}" class="alert alert-danger" th:text="#{${foutmelding}}"></div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <h1 th:text="${team.teamNaam}"></h1>
                <p><strong th:text="#{label.invitecode}"></strong>:
                    <span th:text="${team.uitnodigingscode}" style="background: #f1f4f9; padding: 0.3rem 0.6rem; border-radius: 4px; font-family: monospace; font-size: 1.1rem; letter-spacing: 2px;"></span>
                </p>
                <p><strong th:text="#{label.totaalscore}"></strong>: <span th:text="${totaleScore}"></span> <span th:text="#{label.punten}"></span></p>
            </div>

            <form th:if="${isEigenaar}" method="post" th:action="@{|/team/${team.id}/regenerate|}">
                <button type="submit" class="btn btn-secondary" th:text="#{button.regenerate.code}">Genereer nieuwe invitecode</button>
            </form>
        </div>
    </div>

    <div class="card">
        <h2 th:text="#{label.leden}">Leden</h2>
        <table>
            <tr>
                <th th:text="#{label.gebruikersnaam}">Gebruikersnaam</th>
                <th th:text="#{label.persoonlijkescore}">Persoonlijke score</th>
                <th th:text="#{label.status}">Status</th>
                <th th:if="${isEigenaar}" th:text="#{label.actions}">Acties</th>
            </tr>
            <tr th:each="lid : ${lidScores}">
                <td th:text="${lid.gebruikersnaam}" style="font-weight: 500;"></td>
                <td th:text="${lid.score}"></td>
                <td>
                    <span th:if="${lid.eigenaar}" th:text="#{label.eigenaar}" style="color: #0b57d0; font-weight: bold;"></span>
                    <span th:unless="${lid.eigenaar}" th:text="#{label.geen}" style="color: #6c757d;"></span>
                </td>
                <td th:if="${isEigenaar}">
                    <form method="post" th:if="${!lid.eigenaar}" th:action="@{|/team/${team.id}/leden/${lid.gebruikerId}/verwijder|}" style="margin: 0;">
                        <button type="submit" class="btn btn-danger" style="padding: 0.3rem 0.6rem; font-size: 0.9rem;" th:text="#{button.remove}">Lid verwijderen</button>
                    </form>
                    <span th:if="${lid.eigenaar}" th:text="#{label.geen}">-</span>
                </td>
            </tr>
        </table>
    </div>
</div>
</body>
</html>
