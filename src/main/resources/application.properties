score.punten.exact=5
score.punten.winnaar=2
score.bonus.uniek.exact=3
score.bonus.uniek.winnaar=1

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.thymeleaf.cache=false
spring.mvc.format.date-time=dd/MM/yyyy HH:mm
spring.mvc.throw-exception-if-no-handler-found=true
app.rest.base-url=http://localhost:8080

# Database config
spring.datasource.url=jdbc:mysql://localhost:3306/worldcup_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
